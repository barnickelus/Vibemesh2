<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>VibeMesh · Geometry in Time</title>

<style>
:root{
  --cyan:#00f0ff; --mag:#ff00aa; --grn:#00ff88; --amber:#ffaa00;
  --dim:#3a3a44; --dim2:#555; --bg:#040407;
  --mono:'SF Mono',ui-monospace,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:radial-gradient(circle at 50% 35%,#0b0b14 0%,var(--bg) 75%);
  color:#e8e8ee;font-family:var(--mono);
  position:fixed;touch-action:none;
}
canvas#gl{position:fixed;inset:0;width:100%;height:100%;display:block}

/* ── Top status strip ── */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:30;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;
  pointer-events:none;
}
.topbar .brand{color:var(--cyan);font-weight:600}
.topbar .brand b{color:#fff;font-weight:800}
.topbar .telem{color:var(--dim2);text-align:right;line-height:1.7}
.topbar .telem b{color:var(--cyan);font-weight:600}
.topbar .telem .good{color:var(--grn)}

/* ── Lore line ── */
.lore{
  position:fixed;top:50%;left:0;right:0;text-align:center;z-index:5;
  font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:#15151c;
  pointer-events:none;transition:opacity 1s;transform:translateY(-50%);
}

/* ── Bottom control dock ── */
.dock{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  padding:14px 14px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(transparent,rgba(4,4,7,.85)35%);
  display:flex;flex-direction:column;gap:12px;
}
.row{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
.row.center{justify-content:center}

.btn{
  flex:0 0 auto;padding:10px 14px;background:rgba(255,255,255,.035);
  border:1px solid rgba(255,255,255,.1);border-radius:9px;color:#aaa;
  font-family:var(--mono);font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;
  cursor:pointer;transition:.18s;white-space:nowrap;
}
.btn:active{transform:scale(.96)}
.btn.on{background:rgba(0,240,255,.14);border-color:var(--cyan);color:var(--cyan);
  box-shadow:0 0 18px rgba(0,240,255,.18)}
.btn.go{background:rgba(0,255,136,.13);border-color:var(--grn);color:var(--grn)}
.btn.warn{background:rgba(255,0,170,.12);border-color:var(--mag);color:var(--mag)}
.btn:disabled{opacity:.28;pointer-events:none}
.btn.primary{background:linear-gradient(135deg,rgba(0,240,255,.2),rgba(255,0,170,.15));
  border-color:var(--cyan);color:#fff}

/* mode pills */
.pill{
  flex:0 0 auto;padding:7px 11px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.08);border-radius:20px;color:var(--dim2);
  font-family:var(--mono);font-size:.56rem;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;transition:.15s;
}
.pill:active{transform:scale(.95)}
.pill.on{background:rgba(0,240,255,.12);border-color:rgba(0,240,255,.45);color:var(--cyan)}

/* sliders */
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
@media(max-width:520px){.sliders{grid-template-columns:1fr}}
.sl{display:flex;align-items:center;gap:9px}
.sl label{font-size:.52rem;letter-spacing:1px;text-transform:uppercase;color:var(--dim2);
  min-width:78px}
.sl input{flex:1;-webkit-appearance:none;height:2px;background:rgba(255,255,255,.15);
  border-radius:2px;cursor:pointer}
.sl input::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--cyan);box-shadow:0 0 8px var(--cyan);cursor:pointer}
.sl input::-moz-range-thumb{width:13px;height:13px;border-radius:50%;background:var(--cyan);
  border:none;box-shadow:0 0 8px var(--cyan)}
.sl .v{font-size:.55rem;color:var(--cyan);min-width:30px;text-align:right}

.collapse{max-height:0;overflow:hidden;transition:max-height .35s ease}
.collapse.open{max-height:240px}

.pip{position:fixed;right:12px;z-index:31;width:62px;height:80px;border-radius:8px;
  overflow:hidden;border:1px solid rgba(255,255,255,.12);opacity:.5;
  bottom:calc(170px + env(safe-area-inset-bottom));transition:opacity .3s}
.pip:active{opacity:.9}
.pip video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
video#cam{position:fixed;top:-9999px;left:-9999px;width:640px;height:480px}

.hint{position:fixed;left:0;right:0;bottom:calc(180px + env(safe-area-inset-bottom));
  text-align:center;font-size:.52rem;letter-spacing:1px;color:var(--amber);
  z-index:20;pointer-events:none;opacity:0;transition:opacity .4s;text-transform:uppercase}
.hint.show{opacity:.85}
</style>

      <div class="sl"><label>Pulse</label><input type="range" id="s-pulse" min="0" max="3" step="0.05" value="0.8"><span class="v" id="v-pulse">0.8</span></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  VibeMesh — reworked core
//  1. FIXED normalization captured at calibration (no per-frame drift)
//  2. Rigid head pose via quaternion Kabsch (Horn's method)
//  3. Expression = residual after removing rigid pose
//  4. All visual modes share ONE stable point buffer
// ═══════════════════════════════════════════════════════════════

const V = {
  sub:(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]],
  add:(a,b)=>[a[0]+b[0],a[1]+b[1],a[2]+b[2]],
  scale:(a,s)=>[a[0]*s,a[1]*s,a[2]*s],
  dot:(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2],
  norm:a=>{const l=Math.hypot(a[0],a[1],a[2])||1;return [a[0]/l,a[1]/l,a[2]/l];},
  cross:(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]],
};

const RIGID_IDX = [33,263,1,168,6,197,195,5,4,193,417,122,351,234,454];
const OVAL_IDX = [10,338,297,332,284,251,389,356,454,323,361,288,397,365,
  379,378,400,377,152,148,176,149,150,136,172,58,132,93,234,127,162,21,54,103,67,109];

// ---- Horn's quaternion method for optimal rotation P -> Q ----
// Returns rotation matrix (row-major 9) that best maps centered P onto Q.
function kabsch(P, Q){
  // Cross-covariance M = sum p_i q_i^T
  let Sxx=0,Sxy=0,Sxz=0,Syx=0,Syy=0,Syz=0,Szx=0,Szy=0,Szz=0;
  for(let i=0;i<P.length;i++){
    const p=P[i], q=Q[i];
    Sxx+=p[0]*q[0]; Sxy+=p[0]*q[1]; Sxz+=p[0]*q[2];
    Syx+=p[1]*q[0]; Syy+=p[1]*q[1]; Syz+=p[1]*q[2];
    Szx+=p[2]*q[0]; Szy+=p[2]*q[1]; Szz+=p[2]*q[2];
  }
  // Symmetric 4x4 N matrix (Horn 1987)
  const N=[
    [Sxx+Syy+Szz, Syz-Szy,      Szx-Sxz,      Sxy-Syx],
    [Syz-Szy,     Sxx-Syy-Szz,  Sxy+Syx,      Szx+Sxz],
    [Szx-Sxz,     Sxy+Syx,      -Sxx+Syy-Szz, Syz+Szy],
    [Sxy-Syx,     Szx+Sxz,      Syz+Szy,      -Sxx-Syy+Szz]
  ];
  // Largest eigenvector via power iteration (4x4, converges fast)
  let v=[1,0,0,0];
  for(let it=0;it<32;it++){
    const nv=[
      N[0][0]*v[0]+N[0][1]*v[1]+N[0][2]*v[2]+N[0][3]*v[3],
      N[1][0]*v[0]+N[1][1]*v[1]+N[1][2]*v[2]+N[1][3]*v[3],
      N[2][0]*v[0]+N[2][1]*v[1]+N[2][2]*v[2]+N[2][3]*v[3],
      N[3][0]*v[0]+N[3][1]*v[1]+N[3][2]*v[2]+N[3][3]*v[3]
    ];
    const l=Math.hypot(nv[0],nv[1],nv[2],nv[3])||1;
    v=[nv[0]/l,nv[1]/l,nv[2]/l,nv[3]/l];
  }
  // quaternion (w,x,y,z) -> rotation matrix
  const [w,x,y,z]=v;
  return [
    1-2*(y*y+z*z), 2*(x*y-w*z),   2*(x*z+w*y),
    2*(x*y+w*z),   1-2*(x*x+z*z), 2*(y*z-w*x),
    2*(x*z-w*y),   2*(y*z+w*x),   1-2*(x*x+y*y)
  ];
}
function mat3mulVec(m,v){
  return [m[0]*v[0]+m[1]*v[1]+m[2]*v[2],
          m[3]*v[0]+m[4]*v[1]+m[5]*v[2],
          m[6]*v[0]+m[7]*v[1]+m[8]*v[2]];
}
function transpose(m){return [m[0],m[3],m[6],m[1],m[4],m[7],m[2],m[5],m[8]];}
function matToEuler(m){
  const pitch=Math.asin(Math.max(-1,Math.min(1,-m[7])));
  const yaw=Math.atan2(m[6],m[8]);
  const roll=Math.atan2(m[1],m[4]);
  const d=180/Math.PI;
  return [yaw*d,pitch*d,roll*d];
}

// ═══ MediaPipe Face Tessellation ═══
const TESS = [
  [127,34,139],[11,0,37],[232,231,120],[72,37,39],[128,121,47],[232,120,100],
  [213,215,138],[149,170,176],[209,198,92],[2,94,141],[49,64,98],[173,139,247],
  [149,176,148],[150,136,172],[139,34,127],[11,37,72],[37,232,120],[128,47,121],
  [215,213,138],[150,148,176],[209,92,57],[2,141,94],[64,49,98],[173,247,139],
  [356,389,251],[389,356,454],[10,109,67],[10,67,54],[10,54,21],[10,21,162],
  [10,162,127],[10,127,234],[10,234,93],[10,93,132],[10,132,58],[10,58,172],
  [10,172,136],[10,136,150],[10,150,149],[10,149,176],[10,176,148],[10,148,152],
  [10,152,377],[10,377,400],[10,400,378],[10,378,379],[10,379,365],[10,365,397],
  [10,397,288],[10,288,361],[10,361,323],[10,323,454],[10,454,356],[10,356,389],
  [10,389,251],[10,251,284],[10,284,332],[10,332,297],[10,297,338],
  [33,7,163],[163,144,33],[33,144,145],[145,153,33],[153,154,33],[33,154,155],
  [155,133,33],[33,133,246],[246,161,33],[33,161,160],[160,159,33],[33,159,158],
  [158,157,33],[157,173,33],[33,173,133],
  [263,249,390],[390,373,263],[263,373,374],[374,380,263],[263,380,381],[381,382,263],
  [382,362,263],[263,362,466],[466,388,263],[263,388,387],[387,386,263],[263,386,385],
  [385,384,263],[384,398,263],[263,398,362],
  [0,267,269],[269,270,267],[270,409,267],[409,291,267],[291,375,267],
  [375,321,267],[321,405,267],[405,314,267],[314,17,267],[17,84,267],
  [84,181,267],[181,91,267],[91,146,267],[146,61,267],[61,185,267],
  [185,40,267],[40,39,267],[39,37,267],[37,0,267],
  [78,95,88],[95,78,191],[191,80,95],[80,81,95],[81,82,95],[82,13,95],
  [13,312,95],[312,311,95],[311,310,95],[310,415,95],[415,308,95],[308,324,95],
  [324,318,95],[318,402,95],[402,317,95],[317,14,95],[14,87,95],[87,178,95],
  [178,88,95],
  [454,323,361],[323,454,356],[234,127,162],[127,234,93],[93,132,127],
  [58,132,172],[172,149,148],[148,152,149],[152,148,377],[377,378,148],
  [378,400,148],[400,379,148],[379,365,148],[365,397,148],[397,288,148],
  [288,361,148],[361,454,148],
  [356,389,251],[389,251,284],[251,284,332],[284,332,297],[332,297,338],
  [356,454,323],[454,323,361],[323,361,288],[361,288,397],[288,397,365],
  [397,365,379],[365,379,378],[379,378,400],[378,400,377],[400,377,152],
  [377,152,148],[152,148,176],[148,176,149],[176,149,150],[149,150,136],
  [150,136,172],[136,172,58],[172,58,132],[58,132,93],[132,93,234],
  [93,234,127],[234,127,162],[127,162,21],[162,21,54],[21,54,103],
  [54,103,67],[103,67,109],[67,109,10],
  [33,246,161],[246,161,160],[161,160,159],[160,159,158],[159,158,157],
  [158,157,173],[157,173,133],[173,133,155],[133,155,154],[155,154,153],
  [154,153,145],[153,145,144],[145,144,163],[144,163,7],[163,7,33],
  [263,466,388],[466,388,387],[388,387,386],[387,386,385],[386,385,384],
  [385,384,398],[384,398,362],[398,362,382],[362,382,381],[382,381,380],
  [381,380,374],[380,374,373],[374,373,390],[373,390,249],[390,249,263],
];

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
const ST = {
  mode:'knots', stack:false, advOpen:false,
  depth:3.5, amt:936, pulse:0.8, grid:14, opacity:0.9, smooth:0.35,
  running:false, calibrated:false,
  // calibration baselines (captured once, FIXED — this kills drift)
  neutral:null,        // [468][3] raw landmark positions at calibration
  neutralCentroid:null,// center of rigid points at calibration
  neutralScale:1,      // face scale at calibration (inter-ocular dist)
  zRange:1, zMin:0,    // FIXED depth normalization from calibration
  colors:null,         // Float32 [468*3] sampled face color
  // live solved state
  poseR:[1,0,0,0,1,0,0,0,1],   // current head rotation (smoothed)
  poseT:[0,0,0],               // current head translation (smoothed)
  // smoothed display points in canonical space [468][3]
  canonPts:null,
  fps:0, bw:0,
};

let latest=null;       // latest raw MediaPipe landmarks
let scene,camera,renderer,gl;
let frameN=0,lastFps=performance.now();

// ═══════════════════════════════════════════════════════════════
//  CALIBRATION — capture neutral pose + fixed normalization
//  This is called once. Everything downstream references these
//  baselines so the mapping NEVER rescales per-frame.
// ═══════════════════════════════════════════════════════════════
function calibrate(){
  if(!latest) return false;
  const lm=latest;

  // Store raw neutral
  ST.neutral = lm.map(p=>[p.x,p.y,p.z]);

  // Rigid centroid (mean of rigid points)
  let c=[0,0,0];
  for(const i of RIGID_IDX){ c[0]+=lm[i].x; c[1]+=lm[i].y; c[2]+=lm[i].z; }
  c=V.scale(c,1/RIGID_IDX.length);
  ST.neutralCentroid=c;

  // Face scale = inter-ocular distance (landmarks 33 & 263)
  ST.neutralScale = Math.hypot(
    lm[33].x-lm[263].x, lm[33].y-lm[263].y, lm[33].z-lm[263].z) || 0.1;

  // FIXED depth normalization captured now, reused every frame
  let zmin=Infinity,zmax=-Infinity;
  for(let i=0;i<lm.length;i++){ if(lm[i].z<zmin)zmin=lm[i].z; if(lm[i].z>zmax)zmax=lm[i].z; }
  ST.zMin=zmin; ST.zRange=Math.max(1e-3,zmax-zmin);

  // Canonical points = neutral, centered & scale-normalized, identity pose
  ST.canonPts = lm.map(p=>[
    (p.x-c[0])/ST.neutralScale,
    (p.y-c[1])/ST.neutralScale,
    (p.z-c[2])/ST.neutralScale,
  ]);

  ST.calibrated=true;
  return true;
}

// ═══════════════════════════════════════════════════════════════
//  PER-FRAME SOLVE
//  1. Solve rigid head pose (R,T) aligning current rigid pts to neutral
//  2. Remove pose -> get expression in canonical frame
//  3. Smooth canonical points (stable, low noise)
//  4. Re-apply pose for display (head turns rotate the model in 3D)
// ═══════════════════════════════════════════════════════════════
function solveFrame(lm){
  if(!ST.calibrated) return;

  // Current rigid centroid
  let c=[0,0,0];
  for(const i of RIGID_IDX){ c[0]+=lm[i].x; c[1]+=lm[i].y; c[2]+=lm[i].z; }
  c=V.scale(c,1/RIGID_IDX.length);

  const curScale=Math.hypot(lm[33].x-lm[263].x,lm[33].y-lm[263].y,lm[33].z-lm[263].z)||ST.neutralScale;
  const sInv=1/curScale;

  // Build centered, scale-normalized rigid point sets
  const Pcur=[], Pneu=[];
  for(const i of RIGID_IDX){
    Pcur.push([(lm[i].x-c[0])*sInv,(lm[i].y-c[1])*sInv,(lm[i].z-c[2])*sInv]);
    const n=ST.neutral[i];
    Pneu.push([(n[0]-ST.neutralCentroid[0])/ST.neutralScale,
               (n[1]-ST.neutralCentroid[1])/ST.neutralScale,
               (n[2]-ST.neutralCentroid[2])/ST.neutralScale]);
  }

  // R maps current-canonical rigid pts onto neutral-canonical
  // i.e. removing head rotation. We want display rotation = R^T.
  const Rremove=kabsch(Pcur,Pneu);
  const Rdisp=transpose(Rremove);

  // Smooth pose rotation (slerp-ish via matrix lerp + reorthonormalize)
  const a=ST.smooth;
  for(let k=0;k<9;k++) ST.poseR[k]=ST.poseR[k]*(1-a)+Rdisp[k]*a;
  ST.poseR=reorthonormalize(ST.poseR);

  // Euler for telemetry
  const e=matToEuler(ST.poseR);
  ST._euler=e;

  // For every landmark: compute canonical position (pose removed),
  // smooth it, store. Expression lives here, denoised & pose-free.
  const cp=ST.canonPts;
  for(let i=0;i<lm.length;i++){
    const pc=[(lm[i].x-c[0])*sInv,(lm[i].y-c[1])*sInv,(lm[i].z-c[2])*sInv];
    const canon=mat3mulVec(Rremove,pc); // remove head rotation
    cp[i][0]+=(canon[0]-cp[i][0])*a;
    cp[i][1]+=(canon[1]-cp[i][1])*a;
    cp[i][2]+=(canon[2]-cp[i][2])*a;
  }
}

function reorthonormalize(m){
  let x=V.norm([m[0],m[3],m[6]]);
  let y=[m[1],m[4],m[7]];
  y=V.sub(y,V.scale(x,V.dot(x,y))); y=V.norm(y);
  let z=V.cross(x,y);
  return [x[0],y[0],z[0], x[1],y[1],z[1], x[2],y[2],z[2]];
}

// World-space position for landmark i (canonical -> display rotation -> scale)
// Mirrored X for selfie view. Returns [x,y,z] in scene units.
function worldPos(i){
  const cp=ST.canonPts[i];
  const r=mat3mulVec(ST.poseR,cp);   // apply head rotation in 3D
  const s=ST.depth;
  return [ -r[0]*s, -r[1]*s, r[2]*s ]; // mirror X, flip Y for screen
}

// ═══════════════════════════════════════════════════════════════
//  SHADERS — instanced splat billboards (shared by all point modes)
// ═══════════════════════════════════════════════════════════════
const SPLAT_VERT=`
attribute vec2 aUV;
attribute vec3 iPos;
attribute vec3 iCol;
attribute float iSize;
attribute float iComp;
attribute float iPhase;
attribute float iCent;
varying vec2 vUV; varying vec3 vCol; varying float vComp; varying float vPhase; varying float vCent;
uniform float uTime; uniform float uPulse;
void main(){
  vUV=aUV; vCol=iCol; vComp=iComp; vPhase=iPhase; vCent=iCent;
  vec4 mv=modelViewMatrix*vec4(iPos,1.0);
  float pulse=1.0+sin(uTime*uPulse+iPhase)*0.12*iComp;
  float sz=iSize*(0.5+iComp*0.5)*pulse;
  mv.xy+=aUV*sz;
  gl_Position=projectionMatrix*mv;
}`;

// Knots: concentric RGB-frequency rings
const KNOT_FRAG=`
varying vec2 vUV; varying vec3 vCol; varying float vComp; varying float vPhase; varying float vCent;
uniform float uTime; uniform float uPulse; uniform float uOpacity;
void main(){
  float d=length(vUV); if(d>1.0)discard;
  float r=1.0-d;
  float rA=vCol.r,gA=vCol.g,bA=vCol.b;
  float rC=max(1.0,floor(rA*(2.0+vComp*2.0)));
  float gC=max(1.0,floor(gA*(3.0+vComp*3.0)));
  float bC=max(1.0,floor(bA*(4.0+vComp*5.0)));
  float rP=fract(r*rC+uTime*uPulse*0.5+vPhase*0.15);
  float gP=fract(r*gC+uTime*uPulse*1.0+vPhase*0.12);
  float bP=fract(r*bC+uTime*uPulse*1.8+vPhase*0.10);
  float bw=0.42+vComp*0.06;
  float rB=step(rP,bw)*rA*rA*2.0, gB=step(gP,bw)*gA*gA*1.8, bB=step(bP,bw)*bA*bA*1.6;
  vec3 col=vec3(1.5,0.04,0.0)*rB+vec3(0.04,1.3,0.08)*gB+vec3(0.0,0.16,1.6)*bB;
  float core=exp(-d*d*120.0)*(0.7+vComp*0.3); col+=vCol*core*2.2;
  col*=0.45+vComp*0.55;
  if(vCent>0.5){col*=0.6;}
  float lum=dot(col,vec3(0.299,0.587,0.114));
  float a=lum*exp(-d*d*3.0)*uOpacity;
  if(a<0.008)discard;
  gl_FragColor=vec4(col,a);
}`;

// Splat: clean gaussian in face color
const SPLAT_FRAG=`
varying vec2 vUV; varying vec3 vCol; varying float vComp; varying float vPhase; varying float vCent;
uniform float uTime; uniform float uPulse; uniform float uOpacity;
void main(){
  float d=length(vUV); if(d>1.0)discard;
  float g=exp(-d*d*8.0);
  vec3 col=pow(max(vCol,vec3(0.02)),vec3(0.85));
  col*=mix(vec3(0.9,0.95,1.05),vec3(1.06,0.97,0.9),vComp);
  float spec=exp(-d*d*30.0)*vComp*vComp*0.3; col+=vec3(spec);
  if(vCent>0.5)col*=0.85;
  float a=g*uOpacity;
  if(a<0.005)discard;
  gl_FragColor=vec4(col,a);
}`;

// Realist: tight gaussian, warm/cool depth, gamma lift
const REALIST_FRAG=`
varying vec2 vUV; varying vec3 vCol; varying float vComp; varying float vPhase; varying float vCent;
uniform float uTime; uniform float uPulse; uniform float uOpacity;
void main(){
  float d=length(vUV); if(d>1.0)discard;
  float g=exp(-d*d*6.0);
  vec3 col=pow(max(vCol,vec3(0.02)),vec3(0.82));
  col*=mix(vec3(0.86,0.93,1.07),vec3(1.08,0.98,0.88),vComp);
  float spec=exp(-d*d*22.0)*vComp*vComp*0.35; col+=vec3(spec*1.05,spec*0.95,spec*0.82);
  if(vCent>0.5)col*=0.9;
  float a=g*uOpacity;
  if(a<0.004)discard;
  gl_FragColor=vec4(col,a);
}`;

// Skin: continuous mesh, crosshair-reticle tile grid (from sketch)
const SKIN_VERT=`
attribute vec3 sCol; attribute float sComp;
varying vec3 fCol; varying float fComp; varying vec2 fUV;
uniform float uTime; uniform float uPulse;
void main(){
  fCol=sCol; fComp=sComp;
  fUV=vec2(position.x*0.5+0.5, position.y*0.5+0.5);
  vec3 p=position;
  p.z+=sin(uTime*uPulse*0.6+position.x*3.0)*0.01*sComp;
  gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
}`;
const SKIN_FRAG=`
varying vec3 fCol; varying float fComp; varying vec2 fUV;
uniform float uTime; uniform float uPulse; uniform float uOpacity; uniform float uGrid;
void main(){
  vec2 sc=fUV*uGrid; vec2 cell=floor(sc); vec2 p=(sc-cell-0.5)*2.0;
  float h1=fract(sin(dot(cell,vec2(127.1,311.7)))*43758.5453);
  vec3 fc=max(fCol,vec3(0.05,0.04,0.03));
  float lum=dot(fc,vec3(0.299,0.587,0.114));
  fc=mix(vec3(lum),fc,2.4); fc=pow(clamp(fc,0.001,1.0),vec3(0.48)); fc=clamp(fc*1.5,0.0,1.0);
  vec3 bg=fc*0.12;
  float bX=1.0-smoothstep(0.0,0.10,1.0-abs(p.x));
  float bY=1.0-smoothstep(0.0,0.10,1.0-abs(p.y));
  float border=max(bX,bY);
  vec3 borderCol=clamp(vec3(fc.r*0.6,fc.g*0.3,fc.b*1.4)*2.0,0.0,1.0);
  float aX=1.0-smoothstep(0.0,0.04,abs(p.x));
  float aY=1.0-smoothstep(0.0,0.04,abs(p.y));
  float arm=max(aX,aY);
  vec3 armCol=clamp(vec3(fc.r*0.4,fc.g*1.3,fc.b*0.4),0.0,1.0);
  float d=length(p);
  float r1=1.0-smoothstep(0.0,0.045,abs(d-0.26));
  float r2=1.0-smoothstep(0.0,0.045,abs(d-0.52));
  float r3=1.0-smoothstep(0.0,0.045,abs(d-0.78));
  float pulse=sin(uTime*uPulse*1.2+h1*6.28)*0.5+0.5; r2*=0.7+pulse*0.4;
  vec3 r1c=clamp(vec3(fc.r*2.0,fc.g*0.3,fc.b*0.2),0.0,1.0);
  vec3 r2c=clamp(vec3(fc.r*0.2,fc.g*2.0,fc.b*0.3),0.0,1.0);
  vec3 r3c=clamp(vec3(fc.r*0.2,fc.g*0.3,fc.b*2.0),0.0,1.0);
  float cDot=1.0-smoothstep(0.08,0.12,d);
  vec3 col=bg;
  col=mix(col,r1c,r1); col=mix(col,r2c,r2); col=mix(col,r3c,r3);
  col=mix(col,armCol,arm*0.85); col=mix(col,borderCol,border);
  col=mix(col,fc*1.8,cDot);
  col=clamp(col,0.0,1.0);
  gl_FragColor=vec4(col,uOpacity);
}`;

// ═══════════════════════════════════════════════════════════════
//  TWO-TIER POINT INDEXING (landmarks + centroids)
// ═══════════════════════════════════════════════════════════════
let knotSys=null, skinMesh=null;
const NLM=468;

function buildPointSystem(){
  if(knotSys){scene.remove(knotSys);knotSys.geometry.dispose();knotSys.material.dispose();knotSys=null;}
  if(!ST.calibrated) return;

  const tris=TESS;
  const nTri=tris.length;
  const total=NLM+nTri;

  const iPos=new Float32Array(total*3);
  const iCol=new Float32Array(total*3);
  const iSize=new Float32Array(total);
  const iComp=new Float32Array(total);
  const iPhase=new Float32Array(total);
  const iCent=new Float32Array(total);

  fillPointAttributes(iPos,iCol,iSize,iComp,iPhase,iCent,tris);

  const base=new THREE.BufferGeometry();
  base.setAttribute('position',new THREE.Float32BufferAttribute([-1,-1,0,1,-1,0,1,1,0,-1,1,0],3));
  base.setAttribute('aUV',new THREE.Float32BufferAttribute([-1,-1,1,-1,1,1,-1,1],2));
  base.setIndex(new THREE.BufferAttribute(new Uint16Array([0,1,2,0,2,3]),1));

  const geo=new THREE.InstancedBufferGeometry();
  geo.instanceCount=total;
  geo.setAttribute('position',base.attributes.position);
  geo.setAttribute('aUV',base.attributes.aUV);
  geo.setIndex(base.index);
  geo.setAttribute('iPos',new THREE.InstancedBufferAttribute(iPos,3));
  geo.setAttribute('iCol',new THREE.InstancedBufferAttribute(iCol,3));
  geo.setAttribute('iSize',new THREE.InstancedBufferAttribute(iSize,1));
  geo.setAttribute('iComp',new THREE.InstancedBufferAttribute(iComp,1));
  geo.setAttribute('iPhase',new THREE.InstancedBufferAttribute(iPhase,1));
  geo.setAttribute('iCent',new THREE.InstancedBufferAttribute(iCent,1));

  const frag = ST.mode==='splat'?SPLAT_FRAG : ST.mode==='realist'?REALIST_FRAG : KNOT_FRAG;
  const mat=new THREE.ShaderMaterial({
    vertexShader:SPLAT_VERT, fragmentShader:frag,
    transparent:true, depthWrite:false,
    blending: ST.mode==='realist'?THREE.NormalBlending:THREE.AdditiveBlending,
    uniforms:{uTime:{value:0},uPulse:{value:ST.pulse},uOpacity:{value:ST.opacity}}
  });
  knotSys=new THREE.Mesh(geo,mat);
  knotSys.frustumCulled=false;
  scene.add(knotSys);
}

// Fill/refresh instance attributes from current canonical+pose state
function fillPointAttributes(iPos,iCol,iSize,iComp,iPhase,iCent,tris){
  const C=ST.colors;
  const lmTarget=Math.min(NLM,ST.amt);
  const centTarget=Math.max(0,ST.amt-NLM);
  const lmStep=Math.max(1,Math.floor(NLM/lmTarget));
  const centStep=centTarget>0?Math.max(1,Math.floor(tris.length/centTarget)):1e9;

  const lmSize = ST.mode==='realist'?0.16:0.12;
  const centSize = ST.mode==='realist'?0.11:0.08;

  // landmarks
  for(let i=0;i<NLM;i++){
    const w=worldPos(i);
    iPos[i*3]=w[0]; iPos[i*3+1]=w[1]; iPos[i*3+2]=w[2];
    if(C){iCol[i*3]=C[i*3];iCol[i*3+1]=C[i*3+1];iCol[i*3+2]=C[i*3+2];}
    else {iCol[i*3]=0.2;iCol[i*3+1]=0.7;iCol[i*3+2]=0.9;}
    // compression from canonical Z (stable, not per-frame renormalized)
    const cz=ST.canonPts[i][2];
    iComp[i]=Math.max(0,Math.min(1,0.5 - cz*1.5));
    iPhase[i]=(i*0.618033)%(Math.PI*2);
    iCent[i]=0;
    iSize[i]=(i%lmStep===0)?lmSize:0;
  }
  // centroids
  for(let t=0;t<tris.length;t++){
    const [a,b,c]=tris[t]; const idx=NLM+t;
    if(a>=NLM||b>=NLM||c>=NLM){iSize[idx]=0;continue;}
    iPos[idx*3]=(iPos[a*3]+iPos[b*3]+iPos[c*3])/3;
    iPos[idx*3+1]=(iPos[a*3+1]+iPos[b*3+1]+iPos[c*3+1])/3;
    iPos[idx*3+2]=(iPos[a*3+2]+iPos[b*3+2]+iPos[c*3+2])/3;
    iCol[idx*3]=(iCol[a*3]+iCol[b*3]+iCol[c*3])/3;
    iCol[idx*3+1]=(iCol[a*3+1]+iCol[b*3+1]+iCol[c*3+1])/3;
    iCol[idx*3+2]=(iCol[a*3+2]+iCol[b*3+2]+iCol[c*3+2])/3;
    iComp[idx]=(iComp[a]+iComp[b]+iComp[c])/3;
    iPhase[idx]=((a+b+c)*0.23)%(Math.PI*2);
    iCent[idx]=1;
    iSize[idx]=(t%centStep===0)?centSize:0;
  }
}

// Fast per-frame update of existing buffers (no realloc)
function updatePointSystem(){
  if(!knotSys)return;
  const g=knotSys.geometry;
  fillPointAttributes(
    g.attributes.iPos.array,g.attributes.iCol.array,g.attributes.iSize.array,
    g.attributes.iComp.array,g.attributes.iPhase.array,g.attributes.iCent.array,TESS);
  g.attributes.iPos.needsUpdate=true;
  g.attributes.iSize.needsUpdate=true;
  g.attributes.iComp.needsUpdate=true;
  knotSys.material.uniforms.uPulse.value=ST.pulse;
  knotSys.material.uniforms.uOpacity.value=ST.opacity;
}

// ═══════════════════════════════════════════════════════════════
//  SKIN MESH (continuous surface)
// ═══════════════════════════════════════════════════════════════
function buildSkinMesh(){
  if(skinMesh){scene.remove(skinMesh);skinMesh.geometry.dispose();skinMesh.material.dispose();skinMesh=null;}
  if(!ST.calibrated)return;
  const pos=new Float32Array(NLM*3);
  const col=new Float32Array(NLM*3);
  const comp=new Float32Array(NLM);
  const C=ST.colors;
  for(let i=0;i<NLM;i++){
    const w=worldPos(i);
    pos[i*3]=w[0];pos[i*3+1]=w[1];pos[i*3+2]=w[2];
    if(C){col[i*3]=C[i*3];col[i*3+1]=C[i*3+1];col[i*3+2]=C[i*3+2];}
    const cz=ST.canonPts[i][2];
    comp[i]=Math.max(0,Math.min(1,0.5-cz*1.5));
  }
  const idx=[];
  for(const [a,b,c] of TESS){ if(a<NLM&&b<NLM&&c<NLM) idx.push(a,b,c); }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('sCol',new THREE.Float32BufferAttribute(col,3));
  geo.setAttribute('sComp',new THREE.Float32BufferAttribute(comp,1));
  geo.setIndex(idx);
  const mat=new THREE.ShaderMaterial({
    vertexShader:SKIN_VERT,fragmentShader:SKIN_FRAG,
    transparent:true,side:THREE.DoubleSide,depthWrite:true,
    uniforms:{uTime:{value:0},uPulse:{value:ST.pulse},uOpacity:{value:ST.opacity},uGrid:{value:ST.grid}}
  });
  skinMesh=new THREE.Mesh(geo,mat);
  skinMesh.frustumCulled=false;
  scene.add(skinMesh);
}
function updateSkinMesh(){
  if(!skinMesh)return;
  const pos=skinMesh.geometry.attributes.position;
  const comp=skinMesh.geometry.attributes.sComp;
  for(let i=0;i<NLM;i++){
    const w=worldPos(i);
    pos.array[i*3]=w[0];pos.array[i*3+1]=w[1];pos.array[i*3+2]=w[2];
    const cz=ST.canonPts[i][2];
    comp.array[i]=Math.max(0,Math.min(1,0.5-cz*1.5));
  }
  pos.needsUpdate=true; comp.needsUpdate=true;
  skinMesh.geometry.computeVertexNormals();
  const u=skinMesh.material.uniforms;
  u.uPulse.value=ST.pulse;u.uOpacity.value=ST.opacity;u.uGrid.value=ST.grid;
}

function setWire(on){ if(skinMesh) skinMesh.material.wireframe=on; }

// ═══════════════════════════════════════════════════════════════
//  VISIBILITY — mode + stack
// ═══════════════════════════════════════════════════════════════
function applyMode(){
  const pointMode = (ST.mode==='knots'||ST.mode==='splat'||ST.mode==='realist');
  const meshMode  = (ST.mode==='skin'||ST.mode==='wire');

  // rebuild appropriate systems
  if(pointMode){ buildPointSystem(); if(ST.stack) buildSkinMesh(); }
  else { buildSkinMesh(); if(ST.stack) buildPointSystem(); setWire(ST.mode==='wire'); }

  if(knotSys) knotSys.visible = pointMode || ST.stack;
  if(skinMesh) skinMesh.visible = meshMode || ST.stack;
}

// ═══════════════════════════════════════════════════════════════
//  COLOR SAMPLING (selfie-mirrored)
// ═══════════════════════════════════════════════════════════════
let capCanvas,capCtx;
function sampleColors(){
  if(!latest)return;
  const vid=document.getElementById('cam');
  if(!vid.videoWidth)return;
  capCtx.drawImage(vid,0,0,640,480);
  const px=capCtx.getImageData(0,0,640,480).data;
  ST.colors=new Float32Array(NLM*3);
  for(let i=0;i<NLM;i++){
    const x=Math.min(639,Math.max(0,Math.floor((1-latest[i].x)*640)));
    const y=Math.min(479,Math.max(0,Math.floor(latest[i].y*480)));
    const o=(y*640+x)*4;
    ST.colors[i*3]=px[o]/255;ST.colors[i*3+1]=px[o+1]/255;ST.colors[i*3+2]=px[o+2]/255;
  }
}

// ═══════════════════════════════════════════════════════════════
//  THREE SETUP + RENDER LOOP
// ═══════════════════════════════════════════════════════════════
function initThree(){
  gl=document.getElementById('gl');
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,0.01,100);
  camera.position.z=4.2;
  renderer=new THREE.WebGLRenderer({canvas:gl,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0,0);
  addEventListener('resize',()=>{
    camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
  const clock=new THREE.Clock();
  (function loop(){
    requestAnimationFrame(loop);
    const t=clock.getElapsedTime();
    if(knotSys&&knotSys.visible){knotSys.material.uniforms.uTime.value=t;}
    if(skinMesh&&skinMesh.visible){skinMesh.material.uniforms.uTime.value=t;}
    renderer.render(scene,camera);
    frameN++;
    const now=performance.now();
    if(now-lastFps>500){
      ST.fps=Math.round(frameN*1000/(now-lastFps));frameN=0;lastFps=now;
      updateTelem();
    }
  })();
}

function updateTelem(){
  document.getElementById('t-fps').textContent=ST.fps;
  document.getElementById('t-track').textContent=ST.calibrated?'LOCK':(latest?'SEEK':'—');
  if(ST._euler){
    const[y,p,r]=ST._euler;
    document.getElementById('t-pose').textContent=`${y.toFixed(0)}°`;
  }
  // bitrate estimate: 28 anchors * 3 * int8 delta @ fps
  ST.bw=Math.round(28*3*ST.fps/1000*8); // kbps
  document.getElementById('t-bw').textContent=ST.bw+'k';
}

// ═══════════════════════════════════════════════════════════════
//  CAMERA + MEDIAPIPE
// ═══════════════════════════════════════════════════════════════
async function initOptics(){
  const btn=document.getElementById('b-init');
  btn.textContent='Init…'; btn.disabled=true;
  if(typeof THREE==='undefined'||typeof FaceMesh==='undefined'||typeof Camera==='undefined'){
    btn.textContent='Deps missing'; btn.disabled=false; return;
  }
  initThree();
  capCanvas=document.createElement('canvas');capCanvas.width=640;capCanvas.height=480;
  capCtx=capCanvas.getContext('2d',{willReadFrequently:true});

  let stream;
  try{
    btn.textContent='Camera…';
    stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});
  }catch(e){ btn.textContent='Cam denied'; btn.disabled=false; return; }

  const pip=document.getElementById('pip'), cam=document.getElementById('cam');
  pip.srcObject=stream; cam.srcObject=stream;
  try{pip.play();}catch(_){}; try{cam.play();}catch(_){}
  await new Promise(r=>{ if(cam.readyState>=2)return r(); cam.onloadeddata=r; setTimeout(r,5000); });

  btn.textContent='Mesh…';
  let fm;
  try{
    fm=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    fm.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.6});
    fm.onResults(onResults);
  }catch(e){ btn.textContent='Mesh err'; btn.disabled=false; return; }

  try{
    let busy=false;
    const mp=new Camera(cam,{onFrame:async()=>{if(busy)return;busy=true;try{await fm.send({image:cam});}catch(_){}finally{busy=false;}},width:640,height:480});
    await mp.start();
  }catch(e){ btn.textContent='Stream err'; btn.disabled=false; return; }

  ST.running=true;
  btn.textContent='Live'; btn.classList.add('go'); btn.disabled=false;
  document.getElementById('b-snap').disabled=false;
  showHint('Hold still & face forward, then tap Calibrate');
}

function onResults(res){
  if(!res.multiFaceLandmarks?.[0])return;
  latest=res.multiFaceLandmarks[0];
  if(!ST.calibrated)return; // wait for explicit calibrate (or auto below)
  solveFrame(latest);
  // update active systems
  const pointMode=(ST.mode==='knots'||ST.mode==='splat'||ST.mode==='realist');
  if(pointMode||ST.stack) updatePointSystem();
  if(ST.mode==='skin'||ST.mode==='wire'||ST.stack) updateSkinMesh();
}

// ═══════════════════════════════════════════════════════════════
//  UI WIRING
// ═══════════════════════════════════════════════════════════════
function showHint(txt){
  const h=document.getElementById('hint');
  h.textContent=txt; h.classList.add('show');
  clearTimeout(showHint._t); showHint._t=setTimeout(()=>h.classList.remove('show'),3500);
}

function doCalibrate(){
  if(!latest){showHint('No face detected');return;}
  if(calibrate()){
    sampleColors();
    applyMode();
    document.getElementById('b-recenter').disabled=false;
    document.getElementById('b-snap').textContent='Recalibrate';
    document.getElementById('b-snap').classList.add('on');
    document.getElementById('lore').style.opacity='0';
    showHint('Calibrated · turn your head, open your mouth');
  }
}

function wireUI(){
  document.getElementById('b-init').onclick=initOptics;
  document.getElementById('b-snap').onclick=doCalibrate;

  document.getElementById('b-recenter').onclick=()=>{
    if(latest){calibrate();sampleColors();applyMode();showHint('Recentered');}
  };

  document.getElementById('b-stack').onclick=()=>{
    ST.stack=!ST.stack;
    document.getElementById('b-stack').classList.toggle('on',ST.stack);
    if(ST.calibrated)applyMode();
  };

  document.getElementById('b-adv').onclick=()=>{
    ST.advOpen=!ST.advOpen;
    document.getElementById('advpanel').classList.toggle('open',ST.advOpen);
    document.getElementById('b-adv').classList.toggle('on',ST.advOpen);
  };

  document.querySelectorAll('#modes .pill').forEach(pill=>{
    pill.onclick=()=>{
      document.querySelectorAll('#modes .pill').forEach(p=>p.classList.remove('on'));
      pill.classList.add('on');
      ST.mode=pill.dataset.mode;
      if(ST.calibrated)applyMode();
    };
  });

  const bind=(id,key,fmt)=>{
    const el=document.getElementById(id), v=document.getElementById('v-'+id.slice(2));
    el.oninput=()=>{ST[key]=+el.value; if(v)v.textContent=fmt?fmt(+el.value):el.value;
      // live updates
      if(ST.calibrated){
        if(key==='amt'){ if(knotSys)buildPointSystem(); }
        else if(key==='grid'){ /* uniform updates in loop */ }
      }
    };
  };
  bind('s-depth','depth'); bind('s-amt','amt'); bind('s-pulse','pulse');
  bind('s-grid','grid'); bind('s-op','opacity'); bind('s-smooth','smooth');
}

// boot
addEventListener('load',()=>{
  wireUI();
  const btn=document.getElementById('b-init');
  const miss=[typeof THREE==='undefined'&&'three',typeof FaceMesh==='undefined'&&'facemesh',typeof Camera==='undefined'&&'camera'].filter(Boolean);
  if(miss.length){btn.textContent='Load: '+miss.join(',');}
});
window.onerror=(m,s,l)=>{console.error('ERR',m,l);const b=document.getElementById('b-init');if(b&&b.disabled&&!b.classList.contains('go')){b.textContent='Err—see console';b.disabled=false;}};
</script>
</body>
</html>
